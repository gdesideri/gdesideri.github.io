    Awards:
      - title: 2nd place - Google Developer Student's Club AI Hack 2024
        date: 2024
        summary: >
          Among the top 5 teams of the fintech track over 150 selected students. Built an
          application for financial education powered with LLMs, presenting a working demo that
          could interpret the user's personal finance situation and give improvement suggestions
          as well as learning resources.

      - title: First place - Assosoftware Hackathon
        date: 2024
        summary: >
          Built an explainable stock picker algorithm to help with the selection of stocks for
          client portfolios. Project featured in the final Assosoftware conference in Rome.

      - title: Mentee - Lead The Future
        summary: >
          Among the few Italian students selected as mentees for LeadTheFuture, a leading STEM
          mentorship non-profit with an acceptance rate below 20%, offering one-on-one guidance
          from high-impact mentors at the world's leading innovation hubs such as Silicon Valley
          and CERN.

      - title: 2nd place - Google Developer Student's Club AI Hack 2025
        date: 2025
        summary: Built an application for personalised text re-elaboration based on online learning.

      - title: PoliHUB Award Winner - University Startup Challenge 2025
        date: 2025

