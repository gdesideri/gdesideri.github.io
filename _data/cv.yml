    Experience:
      - company: ML Cube
        position: Machine Learning Intern
        location: Milan, Italy
        start_date: 2024-10
        end_date: 2025-07
        highlights:
          - Optimization of Multi Head Weighting machines using Reinforcement Learning.
          - Engineered features from multi-sensor time-series data for process phase classification.
          - Applied PCA, DTW, and statistical tests to identify critical sensors and patterns.
          - Built pipelines for time-series decomposition, FFT, and feature extraction in Python.
          - Contributed to the design of a Reinforcement Learning-based dynamic pricing and advertising algorithm for hotel rooms.
          - Constructed full RL pipeline for hyperparameter selection and model evaluation using Optuna and MLFlow.

      - company: University of Science and Technology of China
        position: Summer Researcher
        location: Hefei, China
        start_date: 2024-07
        end_date: 2024-07
        highlights:
          - Extracted camera locations and 3D mesh from 360 head scan videos using COLMAP and FaceVerse.
          - Implemented k radial diffusion algorithm to enhance mesh points with color information from COLMAP.
          - Successfully applied 2DGS to the enhanced mesh points using PyTorch obtaining high-quality renders.
          - Findings presented in a poster showcase.

      - company: Digitiamo
        position: Software Engineer (Backend) - Part Time
        location: Milan, Italy
        start_date: 2021-04
        end_date: 2023-07
        highlights:
          - Implemented and maintained over 50 API routes across 20+ resources.
          - Developed over 300 automated tests using Mocha, Chai and Sinon, increasing test coverage to over 90%.
          - Refactored the relational database, reducing query times from minutes to seconds.
          - Contributed to the introduction of Kafka, which completely eliminated TimeOutErrors between microservices.
          - Collaborated in building AWS infrastructure using Terraform and Kubernetes accelerating product shipment.
          - Contributed to the introduction of CI/CD pipelines, reducing the deployment process from 6 hours to just 1 hour.

    Publications:
